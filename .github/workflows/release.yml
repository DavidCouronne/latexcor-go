name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Binaries
        run: |
          mkdir -p dist
          # Build Linux
          GOOS=linux GOARCH=amd64 go build -o dist/latexcor-linux .
          # Build macOS Intel
          GOOS=darwin GOARCH=amd64 go build -o dist/latexcor-macos-intel .
          # Build macOS Apple Silicon
          GOOS=darwin GOARCH=arm64 go build -o dist/latexcor-macos-arm64 .
          # Créer un binaire universel ou par défaut pour macOS (ici on copie l'arm64 pour le lien direct du README)
          cp dist/latexcor-macos-arm64 dist/latexcor-macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/latexcor-linux
            dist/latexcor-macos
            dist/latexcor-macos-intel
            dist/latexcor-macos-arm64
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
